server:
  port: 9090

spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/hams
    driver-class-name: org.mariadb.jdbc.Driver
    username: root
    password: 1234

  jpa:
    open-in-view: false # 영속성 컨텍스트를 View까지 유지할지 여부 # 성능 최적화를 위해 false 권장 (Service 계층까지만 영속성 유지)
    hibernate:
      ddl-auto: update
    show-sql: true # 콘솔에 SQL 출력
    properties:
      hibernate:
        format_sql: true # SQL을 보기 좋게 정렬
        enable_lazy_load_no_trans: true
        highlight_sql: true # SQL 키워드 색상 표시 (IntelliJ 등에서 유용)
        use_sql_comments: true # 쿼리 소스 주석 추가
        jdbc:
          batch_size: 100 # 설정한 개수만큼 모아서 한 번에 쿼리 전송
          order_inserts: true # Insert 쿼리 순서 최적화
          order_updates: true # Update 쿼리 순서 최적화

logging:
  level:
    root: info